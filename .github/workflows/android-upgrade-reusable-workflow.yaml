on:
  workflow_call:
    inputs:
      app:
        type: string
        required: true
      upgradeFrom:
        type: string
        required: true
        description: "SDK version/branch/tag to upgrade FROM"
      api-level:
        type: string
        default: "35"
        description: "Android API level for the emulator"

jobs:
  test-android-upgrade:
    name: ${{ inputs.app }} API ${{ inputs.api-level }} Upgrade from ${{ inputs.upgradeFrom }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"
          add-job-summary: on-failure
      - name: Install Dependencies
        env:
          ANDROID_UI_TEST_CONFIG: ${{ secrets.ANDROID_UI_TEST_CONFIG }}
        run: |
          ./install.sh
          echo $ANDROID_UI_TEST_CONFIG > ./shared/test/android/ui_test_config.json
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-${{ inputs.api-level }}-${{ runner.os }}
      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu guest -noaudio -no-boot-anim -camera-back none -memory 2048 -no-snapshot-save
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."
      - name: Build ${{ inputs.app }}, Login, Upgrade from ${{ inputs.upgradeFrom }} and Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ inputs.api-level }}
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -memory 4096 -no-snapshot-save
          disable-animations: true
          script: |
            mkdir -p ci-diagnostics
            # Stream logcat to a file in the background for post-mortem diagnostics.
            adb logcat -v threadtime > ci-diagnostics/logcat.txt &
            LOGCAT_PID=$!

            set +e
            ./test android ${{ inputs.app }} --upgrade=${{ inputs.upgradeFrom }}
            TEST_EXIT=$?
            set -e

            if [ $TEST_EXIT -ne 0 ]; then
              echo "=== Test failed; capturing device diagnostics ==="
              adb exec-out screencap -p > ci-diagnostics/screenshot.png 2>/dev/null || true
              adb shell uiautomator dump /sdcard/view-hierarchy.xml >/dev/null 2>&1 || true
              adb pull /sdcard/view-hierarchy.xml ci-diagnostics/view-hierarchy.xml 2>/dev/null || true
              adb shell dumpsys window > ci-diagnostics/dumpsys-window.txt 2>/dev/null || true
              adb shell dumpsys activity top > ci-diagnostics/dumpsys-activity-top.txt 2>/dev/null || true
              adb shell dumpsys activity activities > ci-diagnostics/dumpsys-activities.txt 2>/dev/null || true
              adb shell dumpsys meminfo > ci-diagnostics/dumpsys-meminfo.txt 2>/dev/null || true
              adb shell dumpsys gfxinfo > ci-diagnostics/dumpsys-gfxinfo.txt 2>/dev/null || true
              adb shell ps -A > ci-diagnostics/ps.txt 2>/dev/null || true
              adb shell getprop > ci-diagnostics/getprop.txt 2>/dev/null || true
            fi

            kill $LOGCAT_PID 2>/dev/null || true
            wait $LOGCAT_PID 2>/dev/null || true

            exit $TEST_EXIT
      - name: Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          check_name: ${{ inputs.app }} API ${{ inputs.api-level }} Upgrade Test Results
          job_name: ${{ inputs.app }} API ${{ inputs.api-level }} Upgrade Test Results
          require_tests: true
          check_retries: true
          flaky_summary: true
          group_reports: false
          include_passed: true
          skip_annotations: true
          skip_success_summary: false
          include_empty_in_summary: false
          simplified_summary: true
          report_paths: 'Android/app/build/outputs/androidTest-results/**/*.xml'
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-results-${{ inputs.app }}-android-api-${{ inputs.api-level }}-upgrade-${{ inputs.upgradeFrom }}
          path: Android/app/build/outputs/androidTest-results/
      - name: Upload CI Diagnostics
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ci-diagnostics-${{ inputs.app }}-android-api-${{ inputs.api-level }}-upgrade-${{ inputs.upgradeFrom }}
          path: ci-diagnostics/
          if-no-files-found: ignore
