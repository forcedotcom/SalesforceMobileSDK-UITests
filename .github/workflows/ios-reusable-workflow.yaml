on:
  workflow_call:
    inputs:
      app_type:
        type: string
        default: native
      sfdx:
        type: boolean
        default: false
      ios:
        type: string
        default: "26"
        description: "Space-separated iOS major versions (e.g. '17 18 26')"
      is_pr:
        type: boolean
        default: false

jobs:
  test-ios:
    name: ${{ inputs.app_type }} iOS ${{ inputs.ios }}
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        if: ${{ inputs.is_pr }}
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/checkout@v4
        if: ${{ ! inputs.is_pr }}
      - name: Install Dependencies
        env:
          IOS_UI_TEST_CONFIG: ${{ secrets.IOS_UI_TEST_CONFIG }}
        run: |
          ./install.sh
          echo $IOS_UI_TEST_CONFIG > ./shared/test/ios/ui_test_config.json
      - name: Build ${{ inputs.app_type }} and Test Login (iOS ${{ inputs.ios }})
        env:
          GITHUB_RUN_NUM: ${{ github.run_number }}
        run: |
          SFDX=""
          if ${{ inputs.sfdx }} ; then
            SFDX="--sf"
          fi

          ./test ios ${{ inputs.app_type }} --ios "${{ inputs.ios }}" ${SFDX}
      - name: Convert Test Results to JUnit XML
        if: success() || failure()
        run: |
          mkdir -p ios_results
          for xcresult in iOS/test_output/*.xcresult; do
            [ -e "$xcresult" ] || continue
            name=$(basename "$xcresult" .xcresult)
            xml=$(xcrun xcresulttool get test-results junit --path "$xcresult" 2>&1)
            if [ -n "$xml" ]; then
              echo "$xml" > "ios_results/${name}_test_result.xml"
            else
              echo "Warning: xcresulttool produced no output for $xcresult" >&2
            fi
          done
      - name: Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          check_name: ${{ inputs.app_type }} iOS ${{ inputs.ios }} Test Results
          job_name: ${{ inputs.app_type }} iOS ${{ inputs.ios }} Test Results
          require_tests: true
          check_retries: true
          flaky_summary: true
          group_reports: false
          include_passed: true
          skip_annotations: true
          skip_success_summary: true
          include_empty_in_summary: false
          simplified_summary: true
          report_paths: 'ios_results/**.xml'