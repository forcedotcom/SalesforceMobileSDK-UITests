on:
  workflow_call:
    inputs:
      app:
        type: string
        default: native
      sfdx:
        type: boolean
        default: false
      ios:
        type: string
        default: "26"
        description: "Space-separated iOS major versions (e.g. '17 18 26')"
      runner:
        type: string
        default: "macos-26"
      is_pr:
        type: boolean
        default: false

jobs:
  test-ios:
    name: ${{ inputs.app }} iOS ${{ inputs.ios }}
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ inputs.is_pr }}
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/checkout@v4
        if: ${{ ! inputs.is_pr }}
      - name: Free Disk Space
        run: |
          xcrun simctl delete unavailable 2>/dev/null || true
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches/ 2>/dev/null || true
          xcrun simctl runtime list -j 2>/dev/null | python3 -c "
          import json, subprocess, sys
          for r in json.load(sys.stdin).get('runtimes', []):
              if not r.get('name', '').startswith('iOS'):
                  bid = r.get('bundleID') or r.get('identifier') or r.get('runtimeIdentifier', '')
                  if bid:
                      subprocess.run(['xcrun', 'simctl', 'runtime', 'delete', bid], capture_output=True)
          " 2>/dev/null || true
      - name: Install Dependencies
        env:
          IOS_UI_TEST_CONFIG: ${{ secrets.IOS_UI_TEST_CONFIG }}
        run: |
          ./install.sh
          echo $IOS_UI_TEST_CONFIG > ./shared/test/ios/ui_test_config.json
      - name: Build ${{ inputs.app }} and Test Login (iOS ${{ inputs.ios }})
        env:
          GITHUB_RUN_NUM: ${{ github.run_number }}
        run: |
          SFDX=""
          if ${{ inputs.sfdx }} ; then
            SFDX="--sf"
          fi

          ./test ios ${{ inputs.app }} --ios "${{ inputs.ios }}" ${SFDX}
      - name: Convert Test Results to JUnit XML
        if: success() || failure()
        run: |
          brew install xcresultparser
          mkdir -p ios_results
          for xcresult in iOS/test_output/*.xcresult; do
            [ -e "$xcresult" ] || continue
            name=$(basename "$xcresult" .xcresult)
            xcresultparser -o junit "$xcresult" > "ios_results/${name}_test_result.xml"
          done
      - name: iOS Version Summary
        if: success() || failure()
        run: |
          for xcresult in iOS/test_output/*.xcresult; do
            [ -e "$xcresult" ] || continue
            name=$(basename "$xcresult" .xcresult)
            python3 - "$xcresult" "$name" << 'PYEOF'
          import json, subprocess, sys
          xcresult, name = sys.argv[1], sys.argv[2]
          proc = subprocess.run(
              ["xcrun", "xcresulttool", "get", "test-results", "tests",
               "--path", xcresult, "--compact"],
              capture_output=True, text=True)
          if proc.returncode != 0:
              sys.exit(0)
          data = json.loads(proc.stdout)
          device_versions = {d["deviceId"]: d["osVersion"] for d in data.get("devices", [])}
          def walk(nodes, case, results):
              for n in nodes:
                  t, children = n.get("nodeType", ""), n.get("children") or []
                  if t == "Test Case": walk(children, n.get("name", ""), results)
                  elif t == "Device":
                      v = device_versions.get(n.get("nodeIdentifier", ""), "unknown")
                      results.setdefault(v, {"passed": 0, "failed": 0})
                      if n.get("result") == "Passed": results[v]["passed"] += 1
                      else: results[v]["failed"] += 1
                  else: walk(children, case, results)
          results = {}
          walk(data.get("testNodes", []), None, results)
          lines = [f"### {name}", "| iOS Version | Passed | Failed |", "|-------------|--------|--------|"]
          for v, r in sorted(results.items()):
              icon = "✅" if r["failed"] == 0 else "❌"
              lines.append(f"| {icon} iOS {v} | {r['passed']} | {r['failed']} |")
          print("\n".join(lines))
          PYEOF
          done >> $GITHUB_STEP_SUMMARY
      - name: Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          check_name: ${{ inputs.app }} iOS ${{ inputs.ios }} Test Results
          job_name: ${{ inputs.app }} iOS ${{ inputs.ios }} Test Results
          require_tests: true
          check_retries: true
          flaky_summary: true
          group_reports: false
          include_passed: true
          skip_annotations: true
          skip_success_summary: false
          include_empty_in_summary: false
          simplified_summary: true
          report_paths: 'ios_results/**.xml'
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-results-${{ inputs.app }}-ios-${{ inputs.ios }}-sfdx-${{ inputs.sfdx }}
          path: ios_results/**.xml